# =============================================================================
# Argo CD Application — Monitoring stack
#
# Registers the monitoring/ directory of the manifests repository as a
# separate Argo CD Application from the main application stack (k8s/).
#
# Keeping them separate means:
#   - Monitoring config changes don't trigger an application deployment sync
#   - Each stack has its own health status and rollback history in Argo CD
#
# CHANGE BEFORE USE:
#   - spec.source.repoURL: replace with your own manifests repository URL
#   - spec.source.targetRevision: change if your default branch is not 'main'
#
# Apply with:
#   kubectl apply -f monitoring-app.yaml
# =============================================================================
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: monitoring-gitops
  namespace: argocd

spec:
  project: default

  source:
    # CHANGE THIS: your manifests repository URL
    repoURL: https://github.com/your-username/your-gitops-manifests-repo.git
    targetRevision: main
    # Path inside the repo that contains the monitoring manifests
    path: monitoring

  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
