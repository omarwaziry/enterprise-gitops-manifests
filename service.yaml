apiVersion: v1
kind: Service
metadata:
  name: devops-showcase-service
  namespace: production
  labels:
    app: devops-showcase-app
spec:
  # Internal service type routing traffic within the cluster namespace
  type: ClusterIP
  ports:
    - port: 80           # Exposed service port inside the cluster
      targetPort: 8080   # Port on the target pod container
      protocol: TCP
      name: http
  selector:
    app: devops-showcase-app
