apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: devops-showcase-gitops
  namespace: argocd

spec:
  project: default

  source:
    repoURL: https://github.com/omarwaziry/enterprise-gitops-manifests.git
    targetRevision: main
    path: k8s

  destination:
    server: https://kubernetes.default.svc
    namespace: production

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true