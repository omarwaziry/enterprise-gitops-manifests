# =============================================================================
# Service — Internal cluster routing
#
# ClusterIP exposes the application only within the cluster.
# External traffic reaches it exclusively through the Ingress (ingress.yaml).
#
# CHANGE BEFORE USE:
#   - namespace: match whatever you set in deployment.yaml
#   - selector.app: match the 'app' label in your deployment pod template
# =============================================================================
apiVersion: v1
kind: Service
metadata:
  name: devops-showcase-service
  namespace: production
  labels:
    app: devops-showcase-app
spec:
  type: ClusterIP

  selector:
    # Routes traffic to pods that have this label.
    # Must match spec.template.metadata.labels.app in deployment.yaml.
    app: devops-showcase-app

  ports:
    - name: http
      port: 80           # Port exposed inside the cluster
      targetPort: 8080   # Port the container listens on
      protocol: TCP
