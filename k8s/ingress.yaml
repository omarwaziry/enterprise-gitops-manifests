# =============================================================================
# Ingress — External HTTP routing via NGINX Ingress Controller
#
# Routes requests for a specific hostname to the application Service.
#
# CHANGE BEFORE USE:
#   - spec.ingressClassName: confirm your controller's class name with:
#       kubectl get ingressclass
#     Common values: nginx, public, traefik
#   - rules[0].host: set to your actual domain or local hostname.
#     For local Minikube use, add the entry to /etc/hosts:
#       $(minikube ip)  your-app.local
#   - namespace: match whatever you set in deployment.yaml
#
# NOTE: ssl-redirect is disabled here for local/dev use.
# For a production deployment, remove that annotation and configure
# cert-manager or provide a TLS secret under spec.tls.
# =============================================================================
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: devops-showcase-ingress
  namespace: production
  annotations:
    # Disable automatic HTTP → HTTPS redirect for local development.
    nginx.ingress.kubernetes.io/ssl-redirect: "false"

spec:
  # ingressClassName replaces the deprecated kubernetes.io/ingress.class annotation.
  # Run 'kubectl get ingressclass' to find the correct name for your cluster.
  ingressClassName: nginx

  rules:
    # CHANGE THIS: replace with your own hostname
    - host: your-app.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: devops-showcase-service
                port:
                  number: 80
